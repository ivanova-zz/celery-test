version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - redis

  redis:
    image: "redis:alpine"